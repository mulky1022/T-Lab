[phases.setup]
nixpkgs = ["php84", "php84Packages.composer", "nodejs", "postgresql"]

[phases.build]
cmds = ["composer install --no-progress --no-interaction", "npm ci", "npm run build"]

[phases.build.variables]
# Use non-database drivers during build to avoid hitting PostgreSQL before migrations
CACHE_STORE = "array"
SESSION_DRIVER = "array"
QUEUE_CONNECTION = "sync"
DB_CONNECTION = "sqlite"

[phases.start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=8080"
