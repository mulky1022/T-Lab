[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.pgsql", "php84Extensions.pdo_pgsql", "nodejs_22"]

[phases.install]
cmds = [
  "cd backend && composer install --optimize-autoloader --no-scripts --no-interaction",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd backend && touch database/database.sqlite",
  "cd backend && composer install --no-dev --optimize-autoloader",
  "cd frontend && npm run build"
]

[phases.build.variables]
CACHE_STORE = "array"
SESSION_DRIVER = "array"
QUEUE_CONNECTION = "sync"
DB_CONNECTION = "sqlite"
APP_KEY = "base64:dummy_for_build"
JWT_SECRET = "dummy_jwt_secret_for_build"

[start]
cmd = "cd backend && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
